<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="120" rx="12" fill="url(#bgGrad)" />

  <!-- Shield icon -->
  <g transform="translate(28, 18)">
    <path d="M42 4 L42 4 C42 4 28 10 14 8 L14 8 L14 50 C14 66 28 76 42 82 C56 76 70 66 70 50 L70 8 C56 10 42 4 42 4 Z"
          fill="none" stroke="url(#shieldGrad)" stroke-width="3" stroke-linejoin="round"/>
    <!-- Check mark inside shield -->
    <polyline points="30,44 38,52 54,36" fill="none" stroke="#6366f1" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- SpecGuard wordmark -->
  <text x="115" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="32" font-weight="700" letter-spacing="-0.5" fill="#ffffff">Spec</text>
  <text x="195" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="32" font-weight="700" letter-spacing="-0.5" fill="url(#shieldGrad)">Guard</text>

  <!-- Tagline -->
  <text x="115" y="76" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13" font-weight="400" fill="#9ca3af" letter-spacing="0.2">
    Semantic governance for spec files
  </text>

  <!-- Divider line -->
  <line x1="115" y1="86" x2="390" y2="86" stroke="#2d2d4e" stroke-width="1"/>

  <!-- Bottom badges -->
  <text x="115" y="104" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="11" fill="#6366f1">Phase 0 MVP</text>
  <text x="200" y="104" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="11" fill="#4b5563">·</text>
  <text x="212" y="104" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="11" fill="#9ca3af">Claude API</text>
  <text x="280" y="104" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="11" fill="#4b5563">·</text>
  <text x="292" y="104" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="11" fill="#9ca3af">GitHub Actions</text>
</svg>
